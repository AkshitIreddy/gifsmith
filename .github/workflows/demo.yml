# CI + dogfood: build gifsmith and prove it can render its own demo end-to-end
# on a clean Linux machine (browser auto-detected, ffmpeg, headless). The
# rendered demo is uploaded as an artifact — we do NOT auto-commit it back, to
# keep main free of churn from non-deterministic captures.
name: ci

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - run: npm ci
      - run: npm run build

      - name: Render the demo (dogfood smoke test)
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.chrome-path }}
          GIFSMITH_NO_SANDBOX: '1' # Chrome runs as root on the runner
        run: node examples/hello-web/demo.mjs

      - name: Assert the demo rendered
        run: |
          test -s examples/hello-web/out/demo.gif
          test -s examples/hello-web/out/demo.webp
          echo "gifsmith rendered its own demo on a clean machine"

      - name: Upload the rendered demo
        uses: actions/upload-artifact@v4
        with:
          name: gifsmith-demo
          path: examples/hello-web/out/demo.*
